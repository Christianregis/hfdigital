services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: hfdigital_app
        restart: unless-stopped
        volumes:
            - ./:/var/www/html
            - ./var/www/html/vendor
        environment:
            - APP_ENV=local
            - APP_KEY=${APP_KEY}
            - DB_CONNECTION=${DB_CONNECTION}
            - DB_HOST=${DB_HOST}
            - DB_PORT=${DB_PORT}
            - DB_DATABASE=${DB_DATABASE}
            - DB_USERNAME=${DB_USERNAME}
            - DB_PASSWORD=${DB_PASSWORD}
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - hfdigital_network

    nginx:
        image: nginx:1.25-alpine
        container_name: hfdigital_nginx
        restart: unless-stopped
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            app:
                condition: service_healthy
        networks:
            - hfdigital_network
    postgres:
        image: postgres:14-alpine
        container_name: hfdigital_postgres
        restart: unless-stopped
        environment:
            - POSTGRES_USER=${DB_USERNAME}
            - POSTGRES_PASSWORD=${DB_PASSWORD}
            - POSTGRES_DB=${DB_DATABASE}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME}" ]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - hfdigital_network
volumes:
    postgres_data:
networks:
    hfdigital_network:
        driver: bridge
