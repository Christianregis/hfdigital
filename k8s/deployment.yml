apiVersion: apps/v1
kind: Deployment
metadata:
  name: hfdigital-app
  namespace: hfdigital
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hfdigital
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: hfdigital
    spec:
      containers:
        - name: hfdigital
          image: DOCKER_USERNAME/hfdigital:latest
          ports:
            - containerPort: 9000
          env:
            - name: APP_ENV
              value: "production"
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: hfdigital-secret
                  key: APP_KEY
            - name: DB_CONNECTION
              value: "pgsql"
            - name: DB_HOST
              value: "hfdigital-postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              value: "hfdigital"
            - name: DB_USERNAME
              value: "hfdigital_user"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hfdigital-secret
                  key: DB_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
